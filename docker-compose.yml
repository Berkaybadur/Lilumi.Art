services:
  lilumi.web:
    container_name: lilumi-web
    build:
      context: .
      dockerfile: Lilumi.Art.Web/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - MongoSettings__ConnectionString=mongodb://mongo:27017
      - MongoSettings__DatabaseName=LilumiArtDb
      - Jwt__Issuer=Lilumi.Art
      - Jwt__Audience=Lilumi.Art.Client
      - Jwt__Secret=SuperSecretKeyForLilumiArtJwtToken_2026_ChangeMe
      - Smtp__Host=smtp.gmail.com
      - Smtp__Port=587
      - Smtp__Username=
      - Smtp__Password=
      - Smtp__FromEmail=no-reply@lilumi.art
      - Smtp__ToEmail=admin@lilumi.art
      - Smtp__EnableSsl=true
    depends_on:
      - mongo

  mongo:
    container_name: lilumi-mongo
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - lilumi_mongo_data:/data/db

volumes:
  lilumi_mongo_data:
